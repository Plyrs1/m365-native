<!doctype html><meta charset="utf-8"><title>M365 Native · Debug Logs</title><style>body{font:14px system-ui;margin:0;background:#f5f1eb;color:#27231f}main{max-width:1200px;margin:30px auto;padding:0 20px}h1{font-size:24px}.stats{display:flex;gap:12px}.card,table,pre{background:#fffdf9;border:1px solid #d8d0c4;border-radius:4px}.card{padding:16px;min-width:150px}.value{font-size:24px;font-weight:700;display:block}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{padding:11px 14px;border-bottom:1px solid #e4ddd4;text-align:left}tr:hover{background:#faf3ec;cursor:pointer}.ok{color:#3f8064}.hit{color:#8a641e}.muted{color:#766e65}pre{padding:16px;white-space:pre-wrap;overflow:auto;max-height:520px}.hidden{display:none}.back{margin:15px 0}</style><main><h1>Debug Logs</h1><p class="muted">Records client requests, upstream summaries, and gateway responses. Token counts are estimates.</p><section class="stats"><div class="card">Requests<span id="n" class="value">—</span></div><div class="card">Input Tokens<span id="in" class="value">—</span></div><div class="card">Output Tokens<span id="out" class="value">—</span></div><div class="card">Cache Hits<span id="hit" class="value">—</span></div></section><section id="list"><table><thead><tr><th>Time</th><th>Path</th><th>Status</th><th>Duration</th><th>In</th><th>Out</th><th>Cache</th><th>ID</th></tr></thead><tbody id="rows"></tbody></table></section><section id="detail" class="hidden"><button class="back" onclick="showList()">← Back to List</button><h2 id="title"></h2><h3>Client Request</h3><pre id="client"></pre><h3>Upstream Response</h3><pre id="upstream"></pre><h3>Gateway Response</h3><pre id="gateway"></pre></section></main><script>const $=x=>document.getElementById(x);let data=[];function esc(x){return String(x??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function load(){let r=await fetch('/api/admin/debug/logs'),d=await r.json();data=d.records||[];$('n').textContent=data.length;$('in').textContent=data.reduce((a,x)=>a+x.inputTokens,0);$('out').textContent=data.reduce((a,x)=>a+x.outputTokens,0);$('hit').textContent=data.filter(x=>x.cacheHit).length;$('rows').innerHTML=data.map((x,i)=>`<tr onclick="detail(${i})"><td>${new Date(x.at).toLocaleString()}</td><td>${esc(x.method)} ${esc(x.path)}</td><td>${x.status}</td><td>${x.durationMs}ms</td><td>${x.inputTokens}</td><td>${x.outputTokens}</td><td class="${x.cacheHit?'hit':''}">${x.cacheHit?'Hit':'—'}</td><td><code>${esc(x.id)}</code></td></tr>`).join('')||'<tr><td colspan=8>No records</td></tr>'}function detail(i){let x=data[i];$('list').classList.add('hidden');$('detail').classList.remove('hidden');$('title').textContent=x.id+' · '+x.status;$('client').textContent=JSON.stringify(x.client,null,2);$('upstream').textContent=JSON.stringify(x.upstream,null,2);$('gateway').textContent=JSON.stringify(x.gateway,null,2)}function showList(){$('detail').classList.add('hidden');$('list').classList.remove('hidden')}load();setInterval(load,5000)</script>
